project:
  type: website
  output-dir: docs
  execute-dir: project
  render:
    - "index.qmd"
    - "notebooks/*.qmd"
    - "!scripts/glmmTMB.qmd"
    - "!scripts/glmmTMB_no_chr21.qmd"

execute:
  freeze: auto

website:
  title: "Trisomy scRNA-seq"
  sidebar:
    style: "docked"
    contents:
      - text: "Seurat v1"
        file: notebooks/seurat_trisomy_v1.qmd
      - text: "Seurat v2"
        file: notebooks/seurat_trisomy_v2.qmd
      - section: "glmmTMB DE (volcanos)"
        contents:
          - text: "Full genome"
            file: notebooks/glmmTMB_DE.qmd
          - text: "chr21 removed"
            file: notebooks/glmmTMB_DE_chr21_removed.qmd
      - section: "GSEA (glmmTMB, trisomy)"
        contents:
          - text: "Full genome"
            file: notebooks/gsea_glmmTMB_trisomy.qmd
          - text: "chr21 removed"
            file: notebooks/gsea_glmmTMB_trisomy_chr21_removed.qmd
      - text: "hdWGCNA (trisomy)"
        file: notebooks/hdwgcna_trisomy.qmd
      - text: "hdWGCNA + glmmTMB stats (trisomy)"
        file: notebooks/hdwgcna_glmmTMB_stats_trisomy.qmd

format:
  html:
    theme: cosmo
    df-print: paged
    toc: true
    code-fold: show
    code-copy: true
